name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: python -m pip install -e ".[dev,estimate-openai]"

      - name: Ruff
        run: python -m ruff check src tests examples

      - name: Mypy
        run: python -m mypy src

      - name: Tests
        run: python -m pytest --cov --cov-report=term-missing --cov-fail-under=90

      - name: Docs scan
        shell: pwsh
        run: |
          $bad = 'robust|leverage|seamless|seamlessly|delve|harness|moreover|empower|unlock|elevate|streamline|foster|meticulous|pivotal|holistic|cutting-edge|game-changing|revolutionize'
          $docs = @('README.md', 'CHANGELOG.md', 'LOGBOOK.md', 'findings.md', 'evidence/README.md', 'examples/README.md') + (Get-ChildItem docs -Recurse -Filter '*.md' | ForEach-Object { $_.FullName })
          $wordHits = Select-String -Path $docs -Pattern $bad -CaseSensitive:$false
          $charHits = Select-String -Path $docs -Pattern ([char]0x2014),([char]0x2013),([char]0x2018),([char]0x2019),([char]0x201C),([char]0x201D)
          if ($wordHits -or $charHits) {
            $wordHits
            $charHits
            exit 1
          }

  postgres:
    name: PostgreSQL shared-store acceptance
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pollard
          POSTGRES_PASSWORD: pollard
          POSTGRES_DB: pollard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pollard -d pollard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POLLARD_TEST_POSTGRES_DSN: postgresql://pollard:pollard@localhost:5432/pollard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Shared store and contention acceptance
        run: >-
          python -m pytest
          tests/test_store_shared.py
          tests/test_store_postgres.py
          tests/test_governance.py
          tests/test_window_meter.py
